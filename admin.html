<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Confirmaciones — Mis XV Yesenia</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Georgia', serif; background: linear-gradient(180deg, #ffffff 0%, #eaf4fc 100%); color: #1b3a6e; min-height: 100vh; padding: 32px 16px 80px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 26px; color: #16305c; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #2c5a94; margin-bottom: 24px; }
  .stats { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px; }
  .stat { background: #ffffff; border: 1px solid #d3e6f5; border-radius: 14px; box-shadow: 0 10px 30px -14px rgba(22,48,92,0.3); padding: 16px 22px; min-width: 140px; }
  .stat .n { font-size: 28px; font-weight: 700; color: #16305c; line-height: 1; }
  .stat .l { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #2c5a94; margin-top: 6px; }
  table { width: 100%; border-collapse: collapse; background: #ffffff; border-radius: 14px; overflow: hidden; box-shadow: 0 10px 30px -14px rgba(22,48,92,0.3); }
  th, td { text-align: left; padding: 12px 14px; font-size: 14px; border-bottom: 1px solid #eaf4fc; }
  th { background: #16305c; color: #fff; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f4faff; }
  .del { background: none; border: 1px solid #f0b4b4; color: #c23b3b; border-radius: 8px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
  .del:hover { background: #fdeaea; }
  .empty, .err { color: #2c5a94; font-size: 14px; padding: 24px; text-align: center; }
  .err { color: #c23b3b; }
  .refresh { display: inline-block; margin-bottom: 18px; background: #16305c; color: #fff; border: none; border-radius: 999px; padding: 9px 18px; font-size: 12.5px; letter-spacing: 0.05em; cursor: pointer; }
  .refresh:hover { background: #2c5a94; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Confirmaciones — Mis XV Yesenia</h1>
  <p class="sub">Panel privado. No compartas este enlace públicamente.</p>
  <button class="refresh" onclick="load()">↻ Actualizar</button>
  <div class="stats" id="stats"></div>
  <div id="content">Cargando…</div>
</div>

<script>
const DB_URL = 'https://asistencias-c3e1d-default-rtdb.firebaseio.com';

function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleString('es-MX', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
}

async function load() {
  const content = document.getElementById('content');
  const stats = document.getElementById('stats');
  content.textContent = 'Cargando…';
  try {
    const res = await fetch(DB_URL + '/rsvps.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const entries = data ? Object.entries(data) : [];
    entries.sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));

    const families = entries.length;
    stats.innerHTML = `
      <div class="stat"><div class="n">${families}</div><div class="l">Familias confirmadas</div></div>
    `;

    if (entries.length === 0) {
      content.innerHTML = '<div class="empty">Aún no hay confirmaciones.</div>';
      return;
    }

    const rows = entries.map(([key, r]) => `
      <tr>
        <td>${(r.name || '—').replace(/</g, '&lt;')}</td>
        <td>${fmtDate(r.timestamp)}</td>
        <td><button class="del" onclick="del('${key}')">Eliminar</button></td>
      </tr>
    `).join('');

    content.innerHTML = `
      <table>
        <thead><tr><th>Nombre</th><th>Confirmó</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } catch (e) {
    content.innerHTML = '<div class="err">Error al cargar: ' + e.message + '<br>Verifica que las reglas de Firebase permitan lectura en /rsvps.</div>';
  }
}

async function del(key) {
  if (!confirm('¿Eliminar esta confirmación?')) return;
  try {
    await fetch(DB_URL + '/rsvps/' + key + '.json', { method: 'DELETE' });
    load();
  } catch (e) {
    alert('Error al eliminar: ' + e.message);
  }
}

load();
</script>
</body>
</html>
