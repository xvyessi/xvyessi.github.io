  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

13\" x2=\"16\" y2=\"24\" stroke=\"#2c5a94\" stroke-width=\"1.2\"><\u002Fline>\n      <\u002Fsvg>\n    <\u002Fspan>\n    <span class=\"bfly-intro bfly-intro-4\">\n      <svg sc-camel-view-box=\"0 0 32 32\" style=\"width:100%; height:100%; display:block;\">\n        <path d=\"M16 16 C 8 4, 2 6, 3 14 C 4 20, 11 19, 16 16 Z\" fill=\"#bcdcf2\"><\u002Fpath>\n        <path d=\"M16 16 C 24 4, 30 6, 29 14 C 28 20, 21 19, 16 16 Z\" fill=\"#7fb3e0\"><\u002Fpath>\n        <path d=\"M16 16 C 10 22, 6 24, 8 27 C 11 29, 15 24, 16 16 Z\" fill=\"#bcdcf2\"><\u002Fpath>\n        <path d=\"M16 16 C 22 22, 26 24, 24 27 C 21 29, 17 24, 16 16 Z\" fill=\"#7fb3e0\"><\u002Fpath>\n        <line x1=\"16\" y1=\"13\" x2=\"16\" y2=\"24\" stroke=\"#2c5a94\" stroke-width=\"1.2\"><\u002Fline>\n      <\u002Fsvg>\n    <\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ambient butterfly field -->\n  <div style=\"position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden;\" aria-hidden=\"true\">\n    <sc-for list=\"{{ butterflies }}\" as=\"b\" hint-placeholder-count=\"7\">\n      <span class=\"bfly {{ b.animClass }}\" style=\"{{ b.style }}\">\n        <svg sc-camel-view-box=\"0 0 32 32\" style=\"width:100%; height:100%; display:block;\">\n          <path d=\"M16 16 C 8 4, 2 6, 3 14 C 4 20, 11 19, 16 16 Z\" fill=\"{{ b.c1 }}\"><\u002Fpath>\n          <path d=\"M16 16 C 24 4, 30 6, 29 14 C 28 20, 21 19, 16 16 Z\" fill=\"{{ b.c2 }}\"><\u002Fpath>\n          <path d=\"M16 16 C 10 22, 6 24, 8 27 C 11 29, 15 24, 16 16 Z\" fill=\"{{ b.c1 }}\"><\u002Fpath>\n          <path d=\"M16 16 C 22 22, 26 24, 24 27 C 21 29, 17 24, 16 16 Z\" fill=\"{{ b.c2 }}\"><\u002Fpath>\n          <line x1=\"16\" y1=\"13\" x2=\"16\" y2=\"24\" stroke=\"#2c5a94\" stroke-width=\"1.2\"><\u002Fline>\n        <\u002Fsvg>\n      <\u002Fspan>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- HERO -->\n  <div data-screen-label=\"Hero\" style=\"position:relative; width:100%; max-width:600px; margin:0 auto; overflow:hidden; z-index:2;\" style-after=\"content:''; position:absolute; left:0; right:0; bottom:0; height:14%; background:linear-gradient(180deg, rgba(255,255,255,0) 0%, #ffffff 100%); pointer-events:none;\">\n    <img class=\"hero-img\" id=\"hero-parallax-img\" src=\"383229f0-4795-4e02-a1c7-6289111398f6\" alt=\"Invitación: Yesenia, Mis 15 años\" style=\"width:100%; display:block;\">\n    <div class=\"scroll-cue\" style=\"position:absolute; bottom:14px; left:50%; transform:translateX(-50%); z-index:3; color:#ffffff; font-size:22px; text-shadow:0 2px 8px rgba(0,0,0,0.35);\">⌄<\u002Fdiv>\n    <a href=\"https://maps.google.com/?q=20.754206,-105.386375\" target=\"_blank\" rel=\"noopener\" style=\"position:absolute; top:84%; left:50%; transform:translateX(-50%); z-index:3; font-family:'Montserrat', sans-serif; font-size:13px; letter-spacing:0.03em; color:#16305c; background:rgba(255,255,255,0.75); padding:6px 16px; border-radius:999px; text-decoration:underline; box-shadow:0 4px 14px -6px rgba(22,48,92,0.35);\">Ver ubicación en el mapa →<\u002Fa>\n  <\u002Fdiv>\n\n  <!-- COUNTDOWN -->\n  <section data-screen-label=\"Countdown\" class=\"reveal\" data-reveal=\"\" style=\"position:relative; z-index:2; max-width:600px; margin:0 auto; padding:64px 32px; text-align:center;\">\n    <p style=\"margin:0 0 18px; font-family:'Montserrat', sans-serif; font-size:12px; letter-spacing:0.28em; text-transform:uppercase; color:#2c5a94; font-weight:600;\">Faltan para el gran día<\u002Fp>\n    <sc-if value=\"{{ countdownDone }}\" hint-placeholder-val=\"{{ false }}\">\n      <p style=\"margin:0; font-family:'Great Vibes', cursive; font-size:34px; color:#16305c;\">¡Hoy es el gran día!<\u002Fp>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ countdownActive }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex; justify-content:center; gap:14px; flex-wrap:wrap;\">\n        <div class=\"c-unit\" style=\"background:#ffffff; border:1px solid #d3e6f5; border-radius:14px; box-shadow:0 10px 30px -12px rgba(22,48,92,0.25); padding:16px 10px; width:74px;\">\n          <span id=\"cd-days\" style=\"display:block; font-family:'Cormorant Garamond', serif; font-size:30px; font-weight:600; color:#16305c; line-height:1;\">00<\u002Fspan>\n          <span style=\"display:block; margin-top:6px; font-family:'Montserrat', sans-serif; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#2c5a94;\">días<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"c-unit\" style=\"background:#ffffff; border:1px solid #d3e6f5; border-radius:14px; box-shadow:0 10px 30px -12px rgba(22,48,92,0.25); padding:16px 10px; width:74px;\">\n          <span id=\"cd-hours\" style=\"display:block; font-family:'Cormorant Garamond', serif; font-size:30px; font-weight:600; color:#16305c; line-height:1;\">00<\u002Fspan>\n          <span style=\"display:block; margin-top:6px; font-family:'Montserrat', sans-serif; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#2c5a94;\">hrs<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"c-unit\" style=\"background:#ffffff; border:1px solid #d3e6f5; border-radius:14px; box-shadow:0 10px 30px -12px rgba(22,48,92,0.25); padding:16px 10px; width:74px;\">\n          <span id=\"cd-mins\" style=\"display:block; font-family:'Cormorant Garamond', serif; font-size:30px; font-weight:600; color:#16305c; line-height:1;\">00<\u002Fspan>\n          <span style=\"display:block; margin-top:6px; font-family:'Montserrat', sans-serif; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#2c5a94;\">min<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"c-unit\" style=\"background:#ffffff; border:1px solid #d3e6f5; border-radius:14px; box-shadow:0 10px 30px -12px rgba(22,48,92,0.25); padding:16px 10px; width:74px;\">\n          <span id=\"cd-secs\" style=\"display:block; font-family:'Cormorant Garamond', serif; font-size:30px; font-weight:600; color:#16305c; line-height:1;\">00<\u002Fspan>\n          <span style=\"display:block; margin-top:6px; font-family:'Montserrat', sans-serif; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#2c5a94;\">seg<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <sc-if value=\"{{ showDressCode }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"margin:26px auto 0; display:inline-block; max-width:220px; background:#fdf2f8; border:1px solid #f3c9dc; border-radius:999px; padding:10px 24px; font-family:'Montserrat', sans-serif; font-size:12.5px; line-height:1.5; letter-spacing:0.02em; color:#b23a72;\">💜 Favor de no llevar ropa ni outfit azul<\u002Fdiv>\n  <\u002Fsc-if>\n  <\u002Fsection>\n\n  <!-- MENSAJE -->\n  <section data-screen-label=\"Mensaje\" class=\"reveal\" data-reveal=\"\" style=\"position:relative; z-index:2; max-width:600px; margin:0 auto; padding:64px 32px; text-align:center;\">\n    <p style=\"margin:0 0 22px; font-family:'Great Vibes', cursive; font-size:52px; color:#16305c; line-height:1;\">Mis XV<\u002Fp>\n    <p style=\"margin:0 auto; font-size:21px; font-style:italic; line-height:1.7; color:#1b3a6e; max-width:44ch;\">Este sueño que llevo esperando toda mi vida por fin llega, y quiero vivirlo rodeada de quienes más quiero. Acompáñame a celebrarlo y a crear un recuerdo que guardaré por siempre.<\u002Fp>\n    <div style=\"width:60px; height:1px; background:#7fb3e0; margin:28px auto; opacity:0.7;\"><\u002Fdiv>\n    <p style=\"margin:0; font-family:'Montserrat', sans-serif; font-size:12.5px; letter-spacing:0.06em; color:#2c5a94;\">Mis papás<\u002Fp>\n    <p style=\"margin:8px 0 0; font-size:19px; color:#16305c;\">Enrique Vega Rodríguez &amp; Noemí Alejandra Torres Galván<\u002Fp>\n  <\u002Fsection>\n\n  <!-- RSVP -->\n  <section data-screen-label=\"RSVP\" class=\"reveal\" data-reveal=\"\" style=\"position:relative; z-index:2; max-width:600px; margin:0 auto; padding:64px 32px; text-align:center;\">\n    <h2 style=\"margin:0 0 30px; font-family:'Alex Brush', cursive; font-size:38px; color:#16305c; font-weight:400;\">Confirma tu asistencia<\u002Fh2>\n    <div style=\"background:#ffffff; border:1px solid #d3e6f5; border-radius:20px; box-shadow:0 10px 30px -12px rgba(22,48,92,0.25); padding:36px 26px;\">\n      <p style=\"margin:0 0 26px; font-family:'Montserrat', sans-serif; font-size:13px; color:#2c5a94;\">Por favor confirma antes del 3 de agosto<\u002Fp>\n\n      <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n        <form sc-camel-on-submit=\"{{ handleSubmit }}\" style=\"display:flex; flex-direction:column; gap:18px;\">\n          <div>\n            <label for=\"guestName\" style=\"display:block; font-family:'Montserrat', sans-serif; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#2c5a94; margin-bottom:8px; text-align:left;\">Tu nombre<\u002Flabel>\n            <input id=\"guestName\" type=\"text\" required=\"{{ true }}\" value=\"{{ nameValue }}\" sc-camel-on-change=\"{{ handleNameChange }}\" placeholder=\"Escribe tu nombre\" style=\"width:100%; box-sizing:border-box; border:1px solid #d3e6f5; border-radius:10px; padding:13px 14px; font-family:'Cormorant Garamond', serif; font-size:17px; color:#1b3a6e; background:#eaf4fc;\" style-focus=\"outline:2px solid #7fb3e0; outline-offset:1px;\">\n          <\u002Fdiv>\n          <button type=\"submit\" disabled=\"{{ sending }}\" style=\"margin-top:6px; background:#16305c; color:#ffffff; border:none; border-radius:999px; padding:15px 20px; font-family:'Montserrat', sans-serif; font-size:13.5px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; transition:background 0.25s ease;\" style-hover=\"background:#2c5a94;\">{{ submitLabel }}<\u002Fbutton>\n        <\u002Fform>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;\">\n          <span style=\"font-size:34px; display:block; margin-bottom:10px;\">💙<\u002Fspan>\n          <p style=\"margin:0; font-size:19px; line-height:1.6;\">¡Gracias por confirmar, {{ confirmedName }}! Nos vemos el 8 de agosto.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ hasCount }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"margin:18px 0 0; font-family:'Montserrat', sans-serif; font-size:12.5px; color:#2c5a94; letter-spacing:0.03em;\">{{ totalLabel }}<\u002Fp>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOTOS -->\n  <section data-screen-label=\"Fotos\" class=\"reveal\" data-reveal=\"\" style=\"position:relative; z-index:2; max-width:600px; margin:0 auto; padding:64px 32px; text-align:center;\">\n    <h2 style=\"margin:0 0 16px; font-family:'Alex Brush', cursive; font-size:38px; color:#16305c; font-weight:400;\">Comparte tus fotos<\u002Fh2>\n    <p style=\"margin:0 0 26px; font-family:'Montserrat', sans-serif; font-size:13px; color:#2c5a94;\">Sube las fotos que tomes en la fiesta para que las disfrutemos todos<\u002Fp>\n    <div style=\"background:#ffffff; border:1px solid #d3e6f5; border-radius:20px; box-shadow:0 10px 30px -12px rgba(22,48,92,0.25); padding:32px 26px;\">\n      <img src=\"7d05bde7-8a06-448a-bd79-7e0d4755b083\" alt=\"Código QR para subir fotos\" style=\"width:190px; height:190px; display:block; margin:0 auto 24px; border-radius:12px;\">\n      <a href=\"https://drive.google.com/drive/folders/1-_78K31ZKoyZRJ2czEk6DZLWQN_Vu1fl?usp=share_link\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block; background:#16305c; color:#ffffff; border-radius:999px; padding:14px 26px; font-family:'Montserrat', sans-serif; font-size:12.5px; letter-spacing:0.06em; text-transform:uppercase; text-decoration:none;\" style-hover=\"background:#2c5a94;\">📁 Abrir carpeta de fotos<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer class=\"reveal\" data-reveal=\"\" style=\"position:relative; z-index:2; max-width:600px; margin:0 auto; padding:48px 32px 80px; text-align:center;\">\n    <span style=\"font-size:26px;\">💙<\u002Fspan>\n    <p style=\"margin:10px 0 0; font-size:9px; letter-spacing:0.03em; color:#2c5a94; opacity:0.55; font-family:'Montserrat', sans-serif;\">Música: “There is Romance” – Kevin MacLeod (incompetech.com), CC BY 4.0<\u002Fp>\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 420, &quot;height&quot;: 900}, &quot;showDressCode&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;}}\">\nconst EVENT_DATE = new Date(2026, 7, 8, 19, 0, 0); // 8 agosto 2026, 7:00 pm hora local\nconst KEY_PREFIX = 'rsvp:';\n\n// Pega aquí la URL de tu Firebase Realtime Database (termina en .firebaseio.com, SIN slash final).\n// Mientras esté vacía, la página sigue funcionando con window.storage / localStorage como respaldo.\nconst FIREBASE_DB_URL = 'https://asistencias-c3e1d-default-rtdb.firebaseio.com';\n\nfunction pad(n) { return String(n).padStart(2, '0'); }\n\nfunction hasSharedStorage() {\n  return typeof window.storage !== 'undefined' && window.storage !== null\n    && typeof window.storage.set === 'function' && typeof window.storage.list === 'function';\n}\n\n// Guarda una confirmación. Orden: Firebase (si hay URL) -> window.storage -> localStorage.\nasync function saveRSVP(entry) {\n  if (FIREBASE_DB_URL) {\n    try {\n      const res = await fetch(FIREBASE_DB_URL + '/rsvps.json', { method: 'POST', body: JSON.stringify(entry) });\n      if (res.ok) return;\n      console.error('Firebase respondió sin ok:', res.status);\n    } catch (e) { console.error('Error guardando en Firebase, cae a respaldo local:', e); }\n  }\n\n  const key = KEY_PREFIX + Date.now() + '-' + Math.random().toString(36).slice(2, 8);\n  if (hasSharedStorage()) {\n    try {\n      const result = await window.storage.set(key, JSON.stringify(entry), true);\n      if (result) return;\n    } catch (e) { /* cae a localStorage */ }\n  }\n  try { localStorage.setItem(key, JSON.stringify(entry)); } catch (e) { /* privacidad/cuota: solo se pierde el conteo */ }\n}\n\nasync function countRSVPs() {\n  if (FIREBASE_DB_URL) {\n    try {\n      const res = await fetch(FIREBASE_DB_URL + '/rsvps.json');\n      if (res.ok) {\n        const data = await res.json();\n        const list = data ? Object.values(data) : [];\n        const families = list.length;\n        const guests = list.reduce((sum, r) => sum + 1 + (Number(r && r.companions) || 0), 0);\n        return { families, guests };\n      }\n    } catch (e) { console.error('Error leyendo Firebase, cae al fallback:', e); }\n  }\n  if (hasSharedStorage()) {\n    try {\n      const result = await window.storage.list(KEY_PREFIX, true);\n      if (result && result.keys) return { families: result.keys.length, guests: null };\n    } catch (e) { /* cae al fallback */ }\n  }\n  try {\n    const n = Object.keys(localStorage).filter((k) => k.indexOf(KEY_PREFIX) === 0).length;\n    return { families: n, guests: null };\n  } catch (e) {\n    return { families: 0, guests: null };\n  }\n}\n\nfunction buildButterflies() {\n  const mid = '#7fb3e0', soft = '#bcdcf2';\n  const spots = [\n    { top: '12%', left: '8%',  size: 36, c1: mid,  c2: soft },\n    { top: '28%', left: '85%', size: 30, c1: soft, c2: mid },\n    { top: '50%', left: '10%', size: 38, c1: mid,  c2: soft },\n    { top: '68%', left: '82%', size: 28, c1: soft, c2: mid },\n    { top: '85%', left: '18%', size: 36, c1: mid,  c2: soft },\n    { top: '40%', left: '50%', size: 24, c1: soft, c2: mid },\n    { top: '76%', left: '46%', size: 30, c1: mid,  c2: soft }\n  ];\n  return spots.map((s, i) => ({\n    c1: s.c1,\n    c2: s.c2,\n    animClass: `bfly-${i + 1}`,\n    style: `position:absolute; top:${s.top}; left:${s.left}; width:${s.size}px; height:${s.size}px; opacity:0.8; filter:drop-shadow(0 4px 10px rgba(22,48,92,0.2));`\n  }));\n}\n\nclass Component extends DCLogic {\n  state = {\n    done: false,\n    nameValue: '', companions: 0,\n    submitted: false, sending: false, confirmedName: '',\n    rsvpCount: { families: 0, guests: null },\n    musicAvailable: false, musicPlaying: false,\n    butterflies: buildButterflies()\n  };\n\n  async componentDidMount() {\n    this.tick();\n    this.timer = setInterval(() => this.tick(), 1000);\n\n    // Música de fondo: el botón solo aparece si existe musica.mp3 junto a la página\n    this.audio = new Audio('musica.mp3');\n    this.audio.loop = true;\n    this.audio.preload = 'metadata';\n    this.audio.addEventListener('loadedmetadata', () => this.setState({ musicAvailable: true }), { once: true });\n    this.audio.addEventListener('error', () => this.setState({ musicAvailable: false }));\n\n    // Reproducción automática: los navegadores (sobre todo en móvil) bloquean el audio con\n    // sonido si antes no hubo una interacción real de la persona. Intentamos arrancar solos\n    // y, si el navegador lo bloquea, arrancamos en cuanto toque, escriba o haga clic en la página.\n    this._interactionEvents = ['pointerdown', 'touchstart', 'keydown', 'click'];\n    this.startOnInteraction = () => {\n      if (this._unlockingMusic) return;\n      this._unlockingMusic = true;\n      this.audio.play().then(() => {\n        this.setState({ musicPlaying: true });\n        this._interactionEvents.forEach((evt) => window.removeEventListener(evt, this.startOnInteraction));\n      }).catch(() => {}).finally(() => { this._unlockingMusic = false; });\n    };\n    this.startOnInteraction();\n    this._interactionEvents.forEach((evt) => window.addEventListener(evt, this.startOnInteraction, { passive: true }));\n\n    const n = await countRSVPs();\n    this.setState({ rsvpCount: n });\n\n    this.observer = new IntersectionObserver((entries) => {\n      entries.forEach((entry) => {\n        if (entry.isIntersecting) {\n          entry.target.classList.add('visible');\n          this.observer.unobserve(entry.target);\n        }\n      });\n    }, { threshold: 0.18 });\n    document.querySelectorAll('[data-reveal]').forEach((el) => this.observer.observe(el));\n\n    // Parallax suave del hero al hacer scroll, fluido vía rAF.\n    this._raf = null;\n    this.onScroll = () => {\n      if (this._raf) return;\n      this._raf = requestAnimationFrame(() => {\n        const hero = document.getElementById('hero-parallax-img');\n        if (hero) {\n          const y = Math.min(window.scrollY, 500);\n          hero.style.transform = `translateY(${y * 0.18}px) scale(${1.08 + y * 0.00012})`;\n        }\n        this._raf = null;\n      });\n    };\n    window.addEventListener('scroll', this.onScroll, { passive: true });\n  }\n\n  componentWillUnmount() {\n    if (this.timer) clearInterval(this.timer);\n    if (this.observer) this.observer.disconnect();\n    if (this.audio) { this.audio.pause(); this.audio = null; }\n    if (this.startOnInteraction) { this._interactionEvents.forEach((evt) => window.removeEventListener(evt, this.startOnInteraction)); }\n    if (this.onScroll) window.removeEventListener('scroll', this.onScroll);\n    if (this._raf) cancelAnimationFrame(this._raf);\n  }\n\n  toggleMusic() {\n    if (!this.audio) return;\n    if (this.state.musicPlaying) {\n      this.audio.pause();\n      this.setState({ musicPlaying: false });\n    } else {\n      this.audio.play().then(() => this.setState({ musicPlaying: true })).catch(() => {});\n    }\n  }\n\n  tick() {\n    // Actualiza el countdown escribiendo directo al DOM (no setState) para que\n    // el resto de la página (foto, mariposas) nunca se vuelva a renderizar cada segundo.\n    const diff = EVENT_DATE.getTime() - Date.now();\n    if (diff <= 0) {\n      if (this.timer) clearInterval(this.timer);\n      this.setState({ done: true });\n      return;\n    }\n    const days = pad(Math.floor(diff / 86400000));\n    const hours = pad(Math.floor((diff % 86400000) / 3600000));\n    const mins = pad(Math.floor((diff % 3600000) / 60000));\n    const secs = pad(Math.floor((diff % 60000) / 1000));\n    const dEl = document.getElementById('cd-days');\n    const hEl = document.getElementById('cd-hours');\n    const mEl = document.getElementById('cd-mins');\n    const sEl = document.getElementById('cd-secs');\n    if (dEl) dEl.textContent = days;\n    if (hEl) hEl.textContent = hours;\n    if (mEl) mEl.textContent = mins;\n    if (sEl) sEl.textContent = secs;\n  }\n\n  async handleSubmit(e) {\n    e.preventDefault();\n    const name = this.state.nameValue.trim();\n    if (!name || this.state.sending) return;\n\n    this.setState({ sending: true });\n    try {\n      await saveRSVP({ name, companions: this.state.companions, timestamp: Date.now() });\n    } catch (err) {\n      console.error('Error guardando confirmación:', err);\n      // Degrada con elegancia: el invitado igual ve su confirmación.\n    }\n    const n = await countRSVPs();\n    this.setState({ sending: false, submitted: true, confirmedName: name, rsvpCount: n });\n  }\n\n  renderVals() {\n    const fam = this.state.rsvpCount.families || 0;\n    const guests = this.state.rsvpCount.guests;\n    return {\n      butterflies: this.state.butterflies,\n      countdownDone: this.state.done,\n      countdownActive: !this.state.done,\n      showDressCode: this.props.showDressCode ?? true,\n      musicAvailable: this.state.musicAvailable,\n      toggleMusic: () => this.toggleMusic(),\n      musicIcon: this.state.musicPlaying ? '⏸' : '♪',\n      nameValue: this.state.nameValue,\n      companions: this.state.companions,\n      handleNameChange: (e) => this.setState({ nameValue: e.target.value }),\n      handlePlus: () => this.setState((s) => ({ companions: Math.min(10, s.companions + 1) })),\n      handleMinus: () => this.setState((s) => ({ companions: Math.max(0, s.companions - 1) })),\n      handleSubmit: (e) => this.handleSubmit(e),\n      notSubmitted: !this.state.submitted,\n      submitted: this.state.submitted,\n      sending: this.state.sending,\n      submitLabel: this.state.sending ? 'Enviando…' : 'Confirmar asistencia',\n      confirmedName: this.state.confirmedName,\n      hasCount: fam > 0,\n      totalLabel: fam + (fam === 1 ? ' familia ha confirmado' : ' familias han confirmado') + (guests ? ` · ${guests} invitados en total` : '')\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"</script>
