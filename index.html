<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>XV — Cargando...</title>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{display:flex;align-items:center;justify-content:center;background:#eaf4fc;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,"Helvetica Neue",Arial}
    .card{background:#fff;padding:28px;border-radius:12px;box-shadow:0 10px 30px rgba(22,48,92,0.08);text-align:center;max-width:420px;width:90%}
    .logo{font-family:Georgia,serif;font-size:56px;color:#16305c;font-style:italic}
    .lead{color:#2c5a94;margin-top:10px}
    .actions{margin-top:18px}
    .btn{background:#16305c;color:#fff;border:none;padding:10px 16px;border-radius:10px;font-weight:600;cursor:pointer}
    .hint{font-size:12px;color:#667; margin-top:8px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">XV</div>
    <div class="lead">Bienvenida — sitio rápido</div>
    <div class="actions">
      <button id="open" class="btn">Abrir sitio completo</button>
    </div>
    <div class="hint">Si prefieres, el sitio completo se cargará sólo cuando lo solicites para ahorrar tiempo de apertura.</div>
  </div>

  <script>
    // Navega a full.html cuando el usuario lo pida
    document.getElementById('open').addEventListener('click', function(){
      location.href = '/full.html';
    });

    // Carga automática en segundo plano opcional: descomentar si quieres carga tras 3s
    // setTimeout(()=>{ location.href = '/full.html'; }, 3000);
  </script>
</body>
</html>
